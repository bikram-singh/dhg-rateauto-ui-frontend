name: DHG Vaccine Fee UI — CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION:    20
  GAR_HOST:        us-central1-docker.pkg.dev
  GCP_REGION:      us-central1
  GCP_PROJECT_ID:  dhg-vaccine-rateauto-nonpord
  GAR_REPOSITORY:  dhg-vaccinefee-repo
  APP_NAME:        dhg-vaccinefee-ui
  WORKING_DIR:     dhg-vaccinefee-ui

jobs:
  build-and-deploy:
    name: Lint → Build → Version Bump → Docker → Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write          # ← Required: push version bump commit + tag
      id-token: write          # ← Required: Workload Identity Federation

    steps:
      # ── 1. Checkout ───────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # Full history needed for bump2version tagging
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Setup Node.js ──────────────────────────────────────
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json

      # ── 3. Install dependencies ───────────────────────────────
      - name: Install npm dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci

      # ── 4. Lint ───────────────────────────────────────────────
      - name: Run ESLint
        working-directory: ${{ env.WORKING_DIR }}
        run: npm run lint

      # ── 5. Build ──────────────────────────────────────────────
      - name: Build React application
        working-directory: ${{ env.WORKING_DIR }}
        run: npm run build

      # ── 6. Authenticate to GCP (WIF) ─────────────────────────
      - name: Authenticate to Google Cloud
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_NONPROD }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT_NONPROD }}

      # ── 7. Configure Docker for GAR ───────────────────────────
      - name: Configure Docker for Artifact Registry
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: gcloud auth configure-docker ${{ env.GAR_HOST }} --quiet

      # ── 8. Bump version (ONLY on push to main) ────────────────
      - name: Setup Python for bump2version
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install bump2version
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: pip install bump2version

      - name: Configure git identity for version bump commit
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version and push tag
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          bump2version patch
          git push origin main --follow-tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 9. Read new version for Docker tag ───────────────────
      - name: Read bumped version
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      # ── 10. Build Docker image ────────────────────────────────
      - name: Build Docker image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          docker build \
            -f Docker/Dockerfile \
            -t ${{ env.GAR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.APP_NAME }}:${{ steps.version.outputs.VERSION }} \
            -t ${{ env.GAR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.APP_NAME }}:latest \
            .

      # ── 11. Push to GAR ───────────────────────────────────────
      - name: Push Docker image to Artifact Registry
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          docker push ${{ env.GAR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.APP_NAME }}:${{ steps.version.outputs.VERSION }}
          docker push ${{ env.GAR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.APP_NAME }}:latest

      # ── 12. Deploy to GKE ─────────────────────────────────────
      - name: Get GKE credentials
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: dhg-rateauto-dev-gke-cluster
          location:     ${{ env.GCP_REGION }}
          project_id:   ${{ env.GCP_PROJECT_ID }}

      - name: Deploy to GKE
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          kubectl set image deployment/${{ env.APP_NAME }} \
            ${{ env.APP_NAME }}=${{ env.GAR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.APP_NAME }}:${{ steps.version.outputs.VERSION }} \
            -n dhg-rateauto-dev-namespace

      - name: Verify rollout
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          kubectl rollout status deployment/${{ env.APP_NAME }} \
            -n dhg-rateauto-dev-namespace \
            --timeout=300s