name: Continuous Integration

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  actions: read
  contents: write
  pull-requests: write
  security-events: write
  id-token: write

env:
  NODE_VERSION: "20"
  GAR_HOST: "us-central1-docker.pkg.dev"
  GCP_REGION: "us-central1"
  GCP_PROJECT_ID: "dhg-vaccine-rateauto-nonpord"
  GAR_REPOSITORY: "dhg-vaccinefee-repo"
  APP_NAME: "dhg-vaccinefee-ui"
  WORKING_DIR: "dhg-vaccinefee-ui"

jobs:
  setup:
    name: Setup metadata
    runs-on: ubuntu-latest
    outputs:
      APP_NAME: ${{ steps.meta.outputs.APP_NAME }}
      APP_VERSION: ${{ steps.meta.outputs.APP_VERSION }}
      IMAGE_URL: ${{ steps.meta.outputs.IMAGE_URL }}
      ABORT: ${{ steps.guard.outputs.ABORT }}
      SHOULD_DEPLOY: ${{ steps.guard.outputs.SHOULD_DEPLOY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup metadata
        id: meta
        shell: bash
        run: |
          APP_VERSION="${GITHUB_SHA}"
          IMAGE_URL="us-central1-docker.pkg.dev/dhg-vaccine-rateauto-nonpord/dhg-vaccinefee-repo/dhg-vaccinefee-ui:${APP_VERSION}"

          echo "APP_NAME=dhg-vaccinefee-ui" >> "$GITHUB_OUTPUT"
          echo "APP_VERSION=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_URL=${IMAGE_URL}" >> "$GITHUB_OUTPUT"

      - name: Setup guardrails
        id: guard
        shell: bash
        run: |
          ABORT="false"
          SHOULD_DEPLOY="false"

          if git log -1 --pretty=%s | grep -q '\[.*\]'; then
            echo "Auto commit detected - aborting."
            ABORT="true"
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "push" && ("${GITHUB_REF}" == "refs/heads/main" || "${GITHUB_REF}" == "refs/heads/master") ]]; then
            SHOULD_DEPLOY="true"
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            SHOULD_DEPLOY="true"
          fi

          if [[ "$ABORT" == "true" ]]; then
            SHOULD_DEPLOY="false"
          fi

          echo "ABORT=${ABORT}" >> "$GITHUB_OUTPUT"
          echo "SHOULD_DEPLOY=${SHOULD_DEPLOY}" >> "$GITHUB_OUTPUT"

  ci:
    name: Lint, test and build
    runs-on: ubuntu-latest
    needs: setup
    if: ${{ needs.setup.outputs.ABORT != 'true' }}
    defaults:
      run:
        working-directory: dhg-vaccinefee-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dhg-vaccinefee-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Build
        run: npm run build

  build-and-push-image:
    name: Build and push image
    runs-on: ubuntu-latest
    needs:
      - setup
      - ci
    if: ${{ needs.setup.outputs.SHOULD_DEPLOY == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_NONPROD }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT_NONPROD }}
          create_credentials_file: true

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: "dhg-vaccine-rateauto-nonpord"

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push image
        env:
          DOCKER_BUILDKIT: 1
          IMAGE_URL: ${{ needs.setup.outputs.IMAGE_URL }}
        run: |
          docker buildx build \
            -f Docker/Dockerfile \
            -t "$IMAGE_URL" \
            --push \
            dhg-vaccinefee-ui/

  deploy-dev:
    name: GKE-Dev
    needs:
      - setup
      - build-and-push-image
    if: ${{ needs.setup.outputs.SHOULD_DEPLOY == 'true' }}
    uses: ./.github/workflows/gke-deploy.yml
    with:
      APP_NAME: "dhg-vaccinefee-ui"
      APP_VERSION: ${{ needs.setup.outputs.APP_VERSION }}
      IMAGE_URL: ${{ needs.setup.outputs.IMAGE_URL }}
      GKE_ENVIRONMENT: dev
      GKE_REGION: "us-central1"
      GKE_CLUSTER: "dhg-rateauto-dev-gke-cluster"
      GKE_NAMESPACE: "dhg-rateauto-dev-namespace"
      GCP_PROJECT_ID: "dhg-vaccine-rateauto-nonpord"
      K8S_MANIFESTS_DIR: k8s
      DEPLOYMENT_NAME: "dhg-vaccinefee-ui"
      SERVICE_NAME: "dhg-vaccinefee-ui-service"
      SERVICE_ACCOUNT_NAME: "dhg-vaccinefee-ui"
      HPA_NAME: "dhg-vaccinefee-ui-hpa"
    secrets: inherit

  # ---------------------------------------------------------------
  # bump-version: Runs after successful dev deploy on main branch
  # Auto-increments patch version, commits and tags the repo
  # ---------------------------------------------------------------
  bump-version:
    name: Bump version
    runs-on: ubuntu-latest
    needs:
      - setup
      - deploy-dev
    if: ${{ needs.setup.outputs.SHOULD_DEPLOY == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bump2version
        run: pip install bump2version

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version and push tag
        run: |
          bump2version patch
          git push origin main --follow-tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

